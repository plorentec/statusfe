services:
  statusfe:
    build: .
    container_name: statusfe
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-string}
    volumes:
      - statusfe-data:/app/data

volumes:
  statusfe-data:
