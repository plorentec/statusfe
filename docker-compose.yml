# Docker Compose for StatusFe
#
# Corporate network troubleshooting:
# If docker build hangs on npm install (DNS resolution timeout),
# your corporate firewall may block Docker's internal DNS.
#
# Fix: Use host network (enabled below). Remove 'ports:' and set DB_HOST to the postgres container name
#   or use network_mode: host on both services so they share the same network namespace.

services:
  statusfe:
    build:
      context: .
      network: host
    container_name: statusfe
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-string}
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_NAME=statusfe
      - DB_USER=postgres
      - DB_PASSWORD=statusfe-secret
    volumes:
      - statusfe-data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: statusfe-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      - POSTGRES_DB=statusfe
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=statusfe-secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  statusfe-data:
  postgres-data:
