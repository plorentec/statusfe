# Docker Compose for StatusFe
#
# Corporate network troubleshooting:
# If docker build hangs on npm install (DNS resolution timeout),
# your corporate firewall may block Docker's internal DNS.
#
# Fix option 1: Use host network (uncomment below, remove 'ports:')
#   network_mode: host
#
# Fix option 2: Configure Docker DNS (edit /etc/docker/daemon.json):
#   {"dns": ["YOUR_CORPORATE_DNS", "8.8.8.8"]}
#   Then: sudo systemctl restart docker
#
# Fix option 3: Use npm mirror (set before build):
#   npm config set registry https://registry.npmmirror.com

services:
  statusfe:
    build: .
    container_name: statusfe
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-string}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=statusfe
      - DB_USER=postgres
      - DB_PASSWORD=statusfe-secret
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - statusfe-data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: statusfe-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=statusfe
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=statusfe-secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  statusfe-data:
  postgres-data:
