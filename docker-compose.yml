services:
  statuspage:
    build: .
    container_name: statuspage
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-string}
    volumes:
      - statuspage-data:/app/data

volumes:
  statuspage-data:
